<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geberit | HydroGuard IIoT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .card-bg { background-color: #0f172a; }
        .monitor-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="text-slate-200 p-8 min-h-screen">
    <header class="max-w-7xl mx-auto mb-10 flex justify-between items-center border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Hydro<span class="text-sky-500">Guard</span></h1>
            <p class="text-slate-400 mt-1 uppercase text-xs tracking-widest font-semibold">Intelligent Water Infrastructure v1.2</p>
        </div>
        <div id="sys-status" class="px-4 py-2 bg-emerald-950 text-emerald-400 border border-emerald-800 rounded-full text-xs font-bold uppercase tracking-wider">System: Nominal</div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="card-bg p-6 rounded-xl border border-slate-700">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Flow Rate</h3>
            <div id="flow-val" class="text-3xl font-bold text-sky-400 mt-2">12.4 L/min</div>
        </div>
        <div class="card-bg p-6 rounded-xl border border-slate-700">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Pressure</h3>
            <div id="press-val" class="text-3xl font-bold text-sky-400 mt-2">3.2 Bar</div>
        </div>
        <div class="card-bg p-6 rounded-xl border border-slate-700">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Daily Usage</h3>
            <div id="usage-val" class="text-3xl font-bold text-emerald-400 mt-2">420 L</div>
        </div>
        <div class="card-bg p-6 rounded-xl border border-slate-700">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">AI Anomaly Risk</h3>
            <div id="risk-val" class="text-3xl font-bold text-emerald-400 mt-2">LOW</div>
        </div>

        <div class="md:col-span-3 space-y-6">
            <div class="card-bg p-6 rounded-xl border border-slate-700 monitor-grid">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Real-time Flow Diagnostics</h2>
                <div id="chart" class="h-64 flex items-end gap-1"></div>
            </div>

            <div class="card-bg p-6 rounded-xl border border-slate-700">
                <h3 class="text-sky-400 font-bold uppercase text-xs tracking-widest mb-4">Remote System Control</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="cmd-input" placeholder="Execute command (CLOSE_VALVE, RUN_DIAG, RESET)..." 
                           class="flex-1 bg-black border border-slate-700 rounded px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-sky-500">
                    <button onclick="processCommand()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-xs font-bold uppercase tracking-wider">Execute</button>
                </div>
            </div>
        </div>

        <div class="card-bg p-6 rounded-xl border border-slate-700 flex flex-col">
            <h3 class="text-sky-400 font-bold uppercase text-xs tracking-widest mb-4">Event Log</h3>
            <div id="log-feed" class="flex-1 overflow-y-auto text-xs font-mono text-slate-400 space-y-2 h-64 border border-slate-800 p-3 bg-black rounded">
                <div>[SYSTEM] HydroGuard Initialized...</div>
            </div>
        </div>
    </main>

    <script>
        const chart = document.getElementById('chart');
        const logFeed = document.getElementById('log-feed');
        const riskEl = document.getElementById('risk-val');
        const sysStatus = document.getElementById('sys-status');
        
        function addLog(msg) {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            logFeed.prepend(div);
        }

        function processCommand() {
            const input = document.getElementById('cmd-input');
            const cmd = input.value.trim().toUpperCase();
            addLog(`COMMAND: ${cmd}`);
            if(cmd === 'CLOSE_VALVE') {
                addLog("ACTION: Main valve closed.");
                document.getElementById('flow-val').innerText = "0.0 L/min";
            } else if(cmd === 'RUN_DIAG') {
                addLog("DIAGNOSTIC: System pressure check successful.");
            } else {
                addLog("ERROR: Invalid Command.");
            }
            input.value = '';
        }

        function updateChart() {
            const bar = document.createElement('div');
            const isAnomaly = Math.random() > 0.96;
            const height = isAnomaly ? 90 : Math.random() * 30 + 30;
            
            bar.className = `flex-1 ${isAnomaly ? 'bg-rose-500' : 'bg-sky-500'} transition-all duration-300`;
            bar.style.height = `${height}%`;
            
            chart.appendChild(bar);
            if(chart.children.length > 40) chart.removeChild(chart.firstChild);

            if(isAnomaly) {
                riskEl.innerText = "CRITICAL";
                riskEl.className = "text-3xl font-bold text-rose-500 mt-2";
                sysStatus.innerText = "LEAK DETECTED";
                sysStatus.className = "px-4 py-2 bg-rose-950 text-rose-400 border border-rose-800 rounded-full text-xs font-bold uppercase tracking-wider";
                addLog("ALERT: Unusually high pressure drop detected!");
            } else if (riskEl.innerText === "CRITICAL") {
                riskEl.innerText = "LOW";
                riskEl.className = "text-3xl font-bold text-emerald-400 mt-2";
                sysStatus.innerText = "System: Nominal";
                sysStatus.className = "px-4 py-2 bg-emerald-950 text-emerald-400 border border-emerald-800 rounded-full text-xs font-bold uppercase tracking-wider";
            }
        }
        setInterval(updateChart, 500);
    </script>
</body>
</html>
